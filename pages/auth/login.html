<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | VendorVerify</title>
  <link rel="stylesheet" href="../../styles/main.css" />
</head>
<body>
  <header class="site-header">
    <div class="container navbar">
      <a class="brand" href="../../index.html">VendorVerify</a>
      <button class="nav-toggle" aria-label="Toggle navigation">☰</button>
      <nav class="nav-links">
        <a href="../../index.html">Home</a>
        <a href="../about.html">About</a>
        <a href="../features.html">Features</a>
        <a href="../pricing.html">Pricing</a>
        <a href="../contact.html">Contact</a>
        <a class="active" href="login.html">Login</a>
        <a class="cta" href="signup.html">Sign Up</a>
      </nav>
    </div>
  </header>

  <main class="page-section">
    <div class="container content-card">
      <h1>Login</h1>
      <p>Access your VendorVerify dashboard to review vendor records and compliance status.</p>

      <form class="auth-form" id="loginForm">
        <div class="form-field">
          <label for="email">Email</label>
          <input id="email" name="email" type="email" placeholder="you@company.com" required />
        </div>

        <div class="form-field">
          <label for="password">Password</label>
          <input id="password" name="password" type="password" placeholder="••••••••" required />
        </div>

        <div class="form-field">
          <label for="role">Role</label>
          <select id="role" name="role">
            <option value="vendor">Vendor User</option>
            <option value="admin">Administrator</option>
          </select>
        </div>

        <div class="hero-actions">
          <button class="btn btn-primary" type="submit">Sign In</button>
          <a class="btn btn-secondary" href="../admin/dashboard.html">Go to Admin Dashboard</a>
        </div>
      </form>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container">© 2026 VendorVerify. All rights reserved.</div>
  </footer>

  <script src="../../scripts/main.js"></script>
  <script>
    const loginForm = document.getElementById('loginForm');

    if (loginForm) {
      loginForm.addEventListener('submit', (event) => {
        event.preventDefault();

        const role = document.getElementById('role')?.value;
        if (role === 'admin') {
          window.location.href = '../admin/dashboard.html';
          return;
        }

        window.location.href = '../../index.html';
      });
    }
  </script>
</body>
</html>
