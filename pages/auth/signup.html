<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Free Vendor Risk Check | VendorVerify</title>
  <link rel="stylesheet" href="../../styles/main.css" />
</head>
<body>
  <header class="site-header">
    <div class="container navbar">
      <a class="brand" href="../../index.html">VendorVerify</a>
      <button class="nav-toggle" aria-label="Toggle navigation">☰</button>
      <nav class="nav-links">
        <a href="../../index.html">Home</a>
        <a href="../about.html">About</a>
        <a href="../features.html">Features</a>
        <a href="../pricing.html">Pricing</a>
        <a href="../contact.html">Contact</a>
        <a href="login.html">Login</a>
        <a class="cta active" href="../../index.html#free-vendor-risk-check">Start Free Vendor Risk Check</a>
      </nav>
    </div>
  </header>

  <main class="page-section">
    <div class="container content-card">
      <h1>Start Free Vendor Risk Check</h1>
      <p>Share vendor details to receive a preliminary risk signal and next-step due diligence guidance.</p>

      <form class="auth-form" id="signupForm">
        <div class="form-field">
          <label for="name">Full Name</label>
          <input id="name" name="name" type="text" placeholder="Jane Doe" required />
        </div>

        <div class="form-field">
          <label for="email">Email</label>
          <input id="email" name="email" type="email" placeholder="you@company.com" required />
        </div>

        <div class="form-field">
          <label for="password">Password</label>
          <input id="password" name="password" type="password" placeholder="••••••••" required />
        </div>

        <div class="form-field">
          <label for="role">Role</label>
          <select id="role" name="role">
            <option value="vendor">Vendor User</option>
            <option value="admin">Administrator</option>
          </select>
        </div>

        <div class="hero-actions">
          <button class="btn btn-primary" type="submit">Run Risk Check</button>
          <a class="btn btn-secondary" href="login.html">Need help? Contact VendorVerify</a>
        </div>
      </form>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container">© 2026 VendorVerify. All rights reserved.</div>
  </footer>

  <script src="../../scripts/auth/auth.js"></script>
  <script src="../../scripts/auth/frontend-auth.js"></script>
  <script src="../../scripts/main.js"></script>
  <script src="../../scripts/api/api-client.js"></script>
  <script src="../../scripts/auth/auth.js"></script>
</body>
</html>
