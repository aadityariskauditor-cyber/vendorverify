<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact | VendorVerify</title>
  <link rel="stylesheet" href="../styles/main.css" />
</head>
<body>
  <header class="site-header">
    <div class="container navbar">
      <a class="brand" href="../index.html">VendorVerify</a>
      <button class="nav-toggle" aria-label="Toggle navigation">☰</button>
      <nav class="nav-links">
        <a href="../index.html">Home</a>
        <a href="about.html">About</a>
        <a href="features.html">Features</a>
        <a href="pricing.html">Pricing</a>
        <a class="active" href="contact.html">Contact</a>
        <a href="auth/login.html">Login</a>
        <a class="cta" href="../index.html#risk-check">Start Free Vendor Risk Check</a>
      </nav>
    </div>
  </header>

  <main class="page-section">
    <div class="container content-card">
      <h1>Contact Us</h1>
      <p>Need help with vendor verification, supplier due diligence, or risk assessment before payment? Send us your requirement and our team will reach out quickly.</p>

      <form class="auth-form" id="contactForm">
        <div class="form-field">
          <label for="contactName">Name</label>
          <input id="contactName" name="name" type="text" required />
        </div>
        <div class="form-field">
          <label for="contactCompany">Company</label>
          <input id="contactCompany" name="company" type="text" required />
        </div>
        <div class="form-field">
          <label for="contactEmail">Email</label>
          <input id="contactEmail" name="email" type="email" required />
        </div>
        <div class="form-field">
          <label for="contactPhone">Phone</label>
          <input id="contactPhone" name="phone" type="tel" pattern="[0-9]{10}" required />
        </div>
        <div class="form-field">
          <label for="contactMessage">Message</label>
          <textarea id="contactMessage" name="message" rows="5" required></textarea>
        </div>
        <button class="btn btn-primary" type="submit">Send Message</button>
        <p id="contactMessageState" aria-live="polite"></p>
      </form>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container">© 2026 VendorVerify. All rights reserved.</div>
  </footer>

  <script src="../scripts/main.js"></script>
  <script src="../scripts/api/api-client.js"></script>
  <script src="../scripts/contact.js"></script>
</body>
</html>
