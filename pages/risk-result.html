<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vendor Risk Result | VendorVerify</title>
  <meta name="description" content="Shared Supplier Risk Intelligence result generated by VendorVerify tools." />
  <link rel="stylesheet" href="../styles/main.css" />
</head>
<body>
  <main class="page-section">
    <div class="container">
      <div class="section-heading">
        <span class="eyebrow">Shared result</span>
        <h1>Vendor Risk Summary</h1>
        <p>This shareable result includes fraud probability and vendor risk signals.</p>
      </div>
      <article class="content-card" id="riskResultContainer" aria-live="polite"></article>
      <div class="hero-actions">
        <a class="btn btn-primary" href="../index.html#sample-vendor-risk-report">Run New Assessment</a>
        <a class="btn btn-secondary" href="../pages/pricing.html">Start Vendor Audit – ₹4,999</a>
      </div>
    </div>
  </main>
  <script>
    (() => {
      const node = document.getElementById('riskResultContainer');
      const query = new URLSearchParams(window.location.search);
      const id = query.get('id');
      const store = JSON.parse(localStorage.getItem('vendorverifyRiskResults') || '{}');
      const entry = id ? store[id] : null;

      if (!entry) {
        node.innerHTML = '<p><strong>Result not found.</strong> Ask the sender to generate a fresh share link.</p>';
        return;
      }

      const payload = entry.payload || {};
      const riskScore = payload.riskScore ?? payload.score ?? payload.exposure ?? '--';
      const fraudProbability = payload.probability ?? '--';

      node.innerHTML = `
        <p><strong>Source:</strong> ${entry.source}</p>
        <p><strong>Vendor Risk Score:</strong> ${riskScore}</p>
        <p><strong>Fraud Probability:</strong> ${fraudProbability}${fraudProbability === '--' ? '' : '%'}</p>
        <p><strong>Snapshot:</strong> ${JSON.stringify(payload)}</p>
      `;
    })();
  </script>
  <script src="../scripts/main.js"></script>
</body>
</html>
