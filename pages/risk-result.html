<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vendor Risk Result | VendorVerify</title>
  <meta name="description" content="Shared Supplier Risk Intelligence result generated by VendorVerify tools." />
  <link rel="stylesheet" href="../styles/main.css" />
</head>
<body>
  <main class="page-section">
    <div class="container">
      <div class="section-heading">
        <span class="eyebrow">Shared result</span>
        <h1>Vendor Risk Summary</h1>
        <p>This shareable result includes fraud probability and vendor risk signals.</p>
      </div>
      <article class="content-card" id="riskResultContainer" aria-live="polite"></article>
      <div class="hero-actions">
        <a class="btn btn-primary" href="../index.html#sample-vendor-risk-report">Run New Assessment</a>
        <a class="btn btn-secondary" href="../pages/pricing.html">Start Vendor Audit – ₹4,999</a>
      </div>
    </div>
  </main>
  <script>
    (() => {
      const node = document.getElementById('riskResultContainer');
      const query = new URLSearchParams(window.location.search);
      const id = query.get('id');
      const snapshotParam = query.get('snapshot');

      function getStoredEntry(entryId) {
        if (!entryId) return null;
        let store = {};

        try {
          const raw = localStorage.getItem('vendorverifyRiskResults');
          store = raw ? JSON.parse(raw) : {};
        } catch (error) {
          console.warn('vendorverifyRiskResults storage corrupted. Resetting.', error);
          store = {};
        }

        return store[String(entryId)] || null;
      }

      function decodeSnapshot(snapshot) {
        if (!snapshot) return null;
        try {
          const normalized = snapshot.replace(/-/g, '+').replace(/_/g, '/');
          const padded = normalized + '='.repeat((4 - (normalized.length % 4)) % 4);
          const binary = atob(padded);
          const bytes = Uint8Array.from(binary, (char) => char.charCodeAt(0));
          const decoded = new TextDecoder().decode(bytes);
          return JSON.parse(decoded);
        } catch (error) {
          return null;
        }
      }

      function safeValue(value, suffix = '') {
        if (value === null || value === undefined || value === '') return '--';
        return `${value}${suffix}`;
      }

      const decodedEntry = decodeSnapshot(snapshotParam);
      const entry = decodedEntry || getStoredEntry(id);

      if (!entry) {
        node.innerHTML = '<p><strong>Result not found.</strong> Ask the sender to generate a fresh share link.</p>';
        return;
      }

      const payload = entry.payload || {};
      const riskScore = payload.riskScore ?? payload.score ?? payload.exposure;
      const fraudProbability = payload.probability;

      node.innerHTML = `
        <p><strong>Source:</strong> ${safeValue(entry.source)}</p>
        <p><strong>Vendor Risk Score:</strong> ${safeValue(riskScore)}</p>
        <p><strong>Fraud Probability:</strong> ${safeValue(fraudProbability, '%')}</p>
        <p><strong>Snapshot:</strong> <code>${JSON.stringify(payload)}</code></p>
      `;
    })();
  </script>
  <script src="../scripts/main.js"></script>
</body>
</html>
